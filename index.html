<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googleカレンダー予定追加URL生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <div class="card p-6 md:p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <svg class="w-8 h-8 mr-2 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/>
                </svg>
                GoogleカレンダーURL生成
            </h1>

            <p class="text-sm text-gray-600 mb-8">
                予定を入力してURLを発行し、共有しましょう。終日の予定にも対応しています。
            </p>

            <div class="space-y-4">
                <!-- Title -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">予定のタイトル *</label>
                    <input type="text" id="eventTitle" placeholder="例：家族旅行" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <!-- All Day Toggle -->
                <div class="flex items-center space-x-2 py-2">
                    <input type="checkbox" id="allDayCheck" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <label for="allDayCheck" class="text-sm font-semibold text-gray-700 cursor-pointer">終日の予定にする</label>
                </div>

                <!-- Dates -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">開始日<span id="labelStartTime">時</span> *</label>
                        <input type="datetime-local" id="startTime" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <input type="date" id="startDate" class="hidden w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">終了日<span id="labelEndTime">時</span> *</label>
                        <input type="datetime-local" id="endTime" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <input type="date" id="endDate" class="hidden w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <!-- Location -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">場所</label>
                    <input type="text" id="location" placeholder="例：成田空港" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">詳細・メモ</label>
                    <textarea id="description" rows="3" placeholder="例：予約番号や集合場所など" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>

                <!-- Generate Section -->
                <div class="pt-6 border-t border-gray-100">
                    <button id="copyBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition duration-200 flex items-center justify-center shadow-lg active:transform active:scale-95">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        URLを生成してコピー
                    </button>
                </div>

                <!-- Status Message -->
                <div id="statusMessage" class="hidden text-center text-sm font-medium py-2 rounded-lg"></div>

                <!-- Preview Link -->
                <div id="urlPreviewArea" class="hidden mt-4 p-4 bg-gray-50 border border-dashed border-gray-300 rounded-lg break-all">
                    <span class="text-xs text-gray-500 block mb-1 font-bold uppercase tracking-wider">生成されたURL:</span>
                    <a id="generatedUrl" href="#" target="_blank" class="text-blue-600 hover:underline text-sm"></a>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-gray-500 text-xs">
            <p>© 2024 Google Calendar Link Generator</p>
        </footer>
    </div>

    <script>
        const eventTitle = document.getElementById('eventTitle');
        const allDayCheck = document.getElementById('allDayCheck');
        
        const startTime = document.getElementById('startTime');
        const endTime = document.getElementById('endTime');
        const startDate = document.getElementById('startDate');
        const endDate = document.getElementById('endDate');
        
        const labelStartTime = document.getElementById('labelStartTime');
        const labelEndTime = document.getElementById('labelEndTime');

        const locationInput = document.getElementById('location');
        const description = document.getElementById('description');
        const copyBtn = document.getElementById('copyBtn');
        const statusMessage = document.getElementById('statusMessage');
        const urlPreviewArea = document.getElementById('urlPreviewArea');
        const generatedUrl = document.getElementById('generatedUrl');

        let isEndTimeModified = false;
        let isEndDateModified = false;

        // 初期設定
        const now = new Date();
        now.setMinutes(0);
        const start = new Date(now.getTime() + 60 * 60 * 1000);
        const end = new Date(start.getTime() + 60 * 60 * 1000);

        startTime.value = formatDateTimeLocal(start);
        endTime.value = formatDateTimeLocal(end);
        startDate.value = formatDate(start);
        endDate.value = formatDate(start);

        function formatDateTimeLocal(date) {
            const tzOffset = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - tzOffset).toISOString().slice(0, 16);
        }

        function formatDate(date) {
            const tzOffset = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - tzOffset).toISOString().slice(0, 10);
        }

        // 開始日時を変更した際、終了日時を1時間後に自動調整
        startTime.addEventListener('input', () => {
            if (!isEndTimeModified && startTime.value) {
                const newStart = new Date(startTime.value);
                const newEnd = new Date(newStart.getTime() + 60 * 60 * 1000);
                endTime.value = formatDateTimeLocal(newEnd);
            }
        });

        // ユーザーが手動で終了日時を触ったら自動調整を解除
        endTime.addEventListener('focus', () => isEndTimeModified = true);
        
        // 開始日を変更した際、終了日を同じ日に自動調整（終日の場合）
        startDate.addEventListener('input', () => {
            if (!isEndDateModified && startDate.value) {
                endDate.value = startDate.value;
            }
        });

        endDate.addEventListener('focus', () => isEndDateModified = true);

        // 終日チェックボックスの切り替え
        allDayCheck.addEventListener('change', (e) => {
            const isAllDay = e.target.checked;
            if (isAllDay) {
                startTime.classList.add('hidden');
                endTime.classList.add('hidden');
                startDate.classList.remove('hidden');
                endDate.classList.remove('hidden');
                labelStartTime.textContent = "";
                labelEndTime.textContent = "";
            } else {
                startTime.classList.remove('hidden');
                endTime.classList.remove('hidden');
                startDate.classList.add('hidden');
                endDate.classList.add('hidden');
                labelStartTime.textContent = "時";
                labelEndTime.textContent = "時";
            }
        });

        function formatToGoogleDate(dateStr, isAllDay) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (isAllDay) {
                return d.toISOString().slice(0, 10).replace(/-/g, "");
            } else {
                return d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            }
        }

        function getNextDay(dateStr) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() + 1);
            return d.toISOString().slice(0, 10).replace(/-/g, "");
        }

        function showStatus(msg, isError = false) {
            statusMessage.textContent = msg;
            statusMessage.className = isError 
                ? "text-red-600 bg-red-50 block mt-4" 
                : "text-green-600 bg-green-50 block mt-4";
            
            setTimeout(() => {
                statusMessage.className = "hidden";
            }, 3000);
        }

        function generateUrl() {
            const title = eventTitle.value.trim();
            const isAllDay = allDayCheck.checked;
            
            let startParam, endParam;
            if (isAllDay) {
                startParam = formatToGoogleDate(startDate.value, true);
                endParam = getNextDay(endDate.value);
            } else {
                startParam = formatToGoogleDate(startTime.value, false);
                endParam = formatToGoogleDate(endTime.value, false);
            }

            const loc = locationInput.value.trim();
            const desc = description.value.trim();

            if (!title) {
                showStatus("予定のタイトルを入力してください", true);
                return null;
            }

            const baseUrl = "https://www.google.com/calendar/render?action=TEMPLATE";
            const params = new URLSearchParams({
                text: title,
                dates: `${startParam}/${endParam}`,
                location: loc,
                details: desc
            });

            return `${baseUrl}&${params.toString()}`;
        }

        copyBtn.addEventListener('click', () => {
            const url = generateUrl();
            if (!url) return;

            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            generatedUrl.textContent = url;
            generatedUrl.href = url;
            urlPreviewArea.classList.remove('hidden');

            showStatus("URLをクリップボードにコピーしました！");
        });
    </script>
</body>
</html>
